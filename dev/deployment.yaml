apiVersion: apps/v1
kind: Deployment
metadata:
  name: mun-app
spec:
  selector:
    matchLabels:
      app: mun-app
  replicas: 1
  template:
    metadata:
      labels:
        app: mun-app
    spec:
      containers:
        - name: mun-app
          resources: {}
          image: ghcr.io/dannil76/municipio-deployment-labs:latest
          env:
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: PUBLIC_DOMAIN
              value: helsingborg.io
            - name: INSTALL_DEMO_DB
              value: "false"
          ports:
            - containerPort: 80
