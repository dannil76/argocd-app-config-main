apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 1
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          resources: {}
          image: mrspex/helsingborg:mun-0.0.2
          env:
            - name: MYSQL_DATABASE
              value: wordpress
          ports:
            - containerPort: 80
