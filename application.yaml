apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mun-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dannil76/argocd-app-config-main.git
    targetRevision: HEAD
    path: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: mun-app

  syncPolicy:
    syncOptions:
      - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true
